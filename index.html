<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="format-detection" content="telephone=no,date=no,email=no,address=no">
<meta name="color-scheme" content="dark light">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SkyTrace">
<title>SkyTrace — Live Flight Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── CSS custom properties ── */
:root{
  --bg:#0d1117;--sur:#161b22;--card:#1e242e;--bdr:#2a3140;
  --acc:#3b82f6;--acc2:#60a5fa;--tx:#e6edf3;--mu:#7d8998;
  --gr:#22c55e;--am:#f59e0b;--re:#ef4444;--rr:12px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
  --font:'Space Grotesk','Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Fira Mono',monospace;
}
[data-theme=light]{--bg:#f0f4f8;--sur:#fff;--card:#e8eef5;--bdr:#c8d4e0;--acc:#2563eb;--acc2:#3b82f6;--tx:#0f172a;--mu:#64748b}
[data-theme=oled]{--bg:#000;--sur:#0a0a0a;--card:#111;--bdr:#1a1a1a;--acc:#3b82f6;--acc2:#60a5fa;--tx:#fff;--mu:#666}
[data-theme=hc]{--bg:#000;--sur:#000;--card:#000;--bdr:#fff;--acc:#ff0;--acc2:#ff0;--tx:#fff;--mu:#ccc}

/* ── Reset & base ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  /* NO height, NO overflow — let the browser handle vertical scroll naturally */
}
body{
  font-family:var(--font);background:var(--bg);color:var(--tx);
  min-height:100svh;
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  /* No overflow rules here — they block iOS vertical scroll */
}
button,input,select,textarea{
  font:inherit;-webkit-appearance:none;appearance:none;
  border-radius:0;
  -webkit-user-select:none;user-select:none;
}
input[type=text],input[type=search]{
  -webkit-user-select:auto;user-select:auto;
}
/* touch-action:manipulation only on actual tap targets — NOT on body/html/containers */
button,.theme-btn,.btn,.pill{touch-action:manipulation}
img,svg{max-width:100%;height:auto;display:block}

/* ── Only real hover on pointer:fine (mouse) devices ── */
@media(hover:hover)and(pointer:fine){
  .pill:hover{border-color:var(--acc);color:var(--acc)}
  .pill.active:hover{background:var(--acc);color:#fff}
  .theme-btn:hover{border-color:var(--acc);color:var(--acc)}
  .fc:hover{border-color:var(--acc)}
  .btn:hover{opacity:.85}
}

/* ── Header ── */
header{
  width:100%;max-width:700px;
  padding:calc(12px + var(--sat)) calc(16px + var(--sar)) 10px calc(16px + var(--sal));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--bdr);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
}
.logo{display:flex;align-items:center;gap:9px;min-width:0;flex-shrink:1;overflow:hidden}
.logo-icon{
  width:34px;height:34px;min-width:34px;background:var(--acc);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.logo-words{min-width:0;overflow:hidden}
.logo-text{
  font-size:.95rem;font-weight:700;letter-spacing:-.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;
}
.logo-sub{
  font-size:.56rem;color:var(--mu);font-family:var(--mono);
  letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1;
}

/* ── Theme buttons ── */
.themes{display:flex;gap:5px;flex-shrink:0}
.theme-btn{
  width:38px;height:38px;border-radius:9px;
  border:1.5px solid var(--bdr);cursor:pointer;
  font-size:10px;font-weight:700;font-family:var(--mono);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,color .15s,transform .1s;
  background:var(--sur);color:var(--mu);flex-shrink:0;
}
.theme-btn.active{border-color:var(--acc);color:var(--acc)}
.theme-btn:active{transform:scale(.90)}

/* ── Main ── */
main{
  width:100%;max-width:700px;
  padding:12px calc(16px + var(--sar)) calc(80px + var(--sab)) calc(16px + var(--sal));
  flex:1;
}

/* ── Region pills – horizontal scroll on mobile ── */
.pills{
  display:flex;gap:7px;margin-bottom:12px;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;-ms-overflow-style:none;
  padding-bottom:3px;
  /* Ensure content never gets clipped */
  margin-left:calc(-1 * (16px + var(--sal)));
  padding-left:calc(16px + var(--sal));
  margin-right:calc(-1 * (16px + var(--sar)));
  padding-right:calc(16px + var(--sar));
}
.pills::-webkit-scrollbar{display:none}
@media(min-width:600px){
  .pills{flex-wrap:wrap;overflow-x:visible;margin-left:0;margin-right:0;padding-left:0;padding-right:0}
}
.pill{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;
  padding:8px 14px;height:38px;
  display:inline-flex;align-items:center;flex-shrink:0;
  font-size:.7rem;font-weight:600;cursor:pointer;
  transition:background .15s,border-color .15s,color .15s,transform .1s;
  font-family:var(--mono);color:var(--mu);white-space:nowrap;
}
.pill:active{transform:scale(.95);background:var(--acc);border-color:var(--acc);color:#fff}
.pill.active{background:var(--acc);border-color:var(--acc);color:#fff}

/* ── Search row ── */
.srow{display:flex;gap:6px;margin-bottom:10px;align-items:center;width:100%}
.swrap{
  flex:1;min-width:0;
  background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;
  padding:0 11px;height:44px;
  display:flex;align-items:center;gap:7px;
  transition:border-color .15s;
}
.swrap:focus-within{border-color:var(--acc)}
.swrap input{
  flex:1;min-width:0;background:none;border:none;outline:none;
  font-family:var(--mono);
  font-size:16px;color:var(--tx);
}
@media(min-width:420px){.swrap input{font-size:.85rem}}
.swrap input::placeholder{color:var(--mu)}
/* Button group — fixed, never wraps */
.sbtns{display:flex;gap:5px;flex-shrink:0}
.smbtn{
  height:44px;width:44px;padding:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;
}
.btn{
  background:var(--acc);color:#fff;border:none;border-radius:9px;
  padding:0 16px;height:44px;min-width:44px;
  font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;
  white-space:nowrap;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.95);opacity:.8}
.btn.ol{background:none;color:var(--acc);border:1.5px solid var(--acc)}

/* ── Status bar ── */
.sbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:5px;font-size:.7rem;color:var(--mu);gap:8px;
}
.ldot{
  width:6px;height:6px;border-radius:50%;background:var(--gr);
  display:inline-block;margin-right:5px;flex-shrink:0;
  animation:pulse 2s infinite;
}
.edot{width:6px;height:6px;border-radius:50%;background:var(--re);display:inline-block;margin-right:5px;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pbar{height:2px;background:var(--bdr);border-radius:2px;margin-bottom:12px;overflow:hidden}
.pfill{height:100%;background:var(--acc);border-radius:2px;width:100%;transition:none}

/* ── Flight cards ── */
.fc{
  background:var(--sur);border:1.5px solid var(--bdr);
  border-radius:var(--rr);padding:13px 13px 11px 16px;
  margin-bottom:9px;cursor:pointer;
  transition:border-color .15s,transform .1s;
  position:relative;
}
/* accent bar via padding-left instead of ::before to avoid overflow:hidden clipping */
.fc::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--acc);border-radius:3px 0 0 3px;
}
.fc:active{transform:scale(.985);border-color:var(--acc)}
.fc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.cs{
  font-family:var(--mono);font-size:.9rem;font-weight:700;
  letter-spacing:.04em;color:var(--acc2);
  min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.badge{
  font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:20px;
  font-family:var(--mono);white-space:nowrap;flex-shrink:0;
}
.air{background:rgba(34,197,94,.12);color:var(--gr);border:1px solid rgba(34,197,94,.25)}
.gnd{background:rgba(245,158,11,.12);color:var(--am);border:1px solid rgba(245,158,11,.25)}
/* Airline name */
.arow{font-size:.72rem;font-weight:600;color:var(--acc2);margin-bottom:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Country row */
.crow{display:flex;align-items:baseline;gap:5px;margin-bottom:8px;flex-wrap:wrap;line-height:1.5}
.cflag{font-size:.88rem;flex-shrink:0}
.cname{font-size:.72rem;font-weight:600;color:var(--tx);flex-shrink:0}
.cori{
  font-size:.62rem;color:var(--mu);font-style:italic;
  /* Clamp etymology to 2 lines on cards — full text in detail panel */
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
/* Live data grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.gi{text-align:center;background:var(--card);border-radius:8px;padding:7px 4px}
.gl{font-size:.54rem;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;
    margin-bottom:3px;font-family:var(--mono);white-space:nowrap}
.gv{font-size:.78rem;font-weight:700;font-family:var(--mono);
    transition:color .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gv.flash{color:var(--acc2)}
.meta{
  display:flex;align-items:center;gap:6px;font-size:.63rem;
  color:var(--mu);font-family:var(--mono);flex-wrap:wrap;
}

/* ── Detail panel ── */
.dp{
  background:var(--sur);border:1.5px solid var(--acc);
  border-radius:var(--rr);padding:15px;margin-bottom:12px;display:none;
}
.dp.show{display:block}
.dph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.dpcs{font-family:var(--mono);font-size:1.05rem;font-weight:700;color:var(--acc2);word-break:break-all}
.dpmu{
  font-size:.6rem;color:var(--mu);font-family:var(--mono);
  margin-top:4px;line-height:1.6;word-break:break-word;
}
.dp-close{
  width:40px;height:40px;min-width:40px;border-radius:8px;
  background:none;border:1.5px solid var(--acc);color:var(--acc);
  font-size:1rem;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.dp-close:active{transform:scale(.9)}
.dp-crow{
  background:var(--card);border-radius:9px;padding:10px 12px;
  margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;
}
.dp-cflag{font-size:1.3rem;flex-shrink:0;line-height:1}
.dp-cname{font-size:.82rem;font-weight:700;margin-bottom:3px}
.dp-cori{font-size:.7rem;color:var(--mu);font-style:italic;line-height:1.55}
.dp-locrow,.dp-routerow{
  background:var(--card);border-radius:9px;padding:10px 12px;
  margin-bottom:7px;font-size:.76rem;font-weight:500;line-height:1.5;
  word-break:break-word;
}
.dpg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dpi{background:var(--card);border-radius:8px;padding:9px 10px}
.dpl{
  font-size:.57rem;color:var(--mu);text-transform:uppercase;
  font-family:var(--mono);letter-spacing:.08em;margin-bottom:3px;
}
.dpv{
  font-size:.82rem;font-weight:600;font-family:var(--mono);
  word-break:break-word;transition:color .3s;line-height:1.4;
}
.dpv.flash{color:var(--acc2)}

/* ── Loader / empty ── */
.loader{text-align:center;padding:48px 20px;color:var(--mu)}
.spin{
  width:30px;height:30px;border:2.5px solid var(--bdr);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--mu);font-size:.85rem;line-height:1.8}

/* ── Footer ── */
footer{
  width:100%;max-width:700px;
  padding:12px calc(16px + var(--sar)) calc(16px + var(--sab)) calc(16px + var(--sal));
  text-align:center;font-size:.67rem;color:var(--mu);
  border-top:1px solid var(--bdr);
}

/* ── Breakpoints ── */
/* Phones 360-480px */
@media(max-width:480px){
  .dpg{grid-template-columns:1fr 1fr}
}
/* Narrow phones ≤360px (iPhone SE gen1/2, small Androids) */
@media(max-width:360px){
  header{padding-left:calc(10px + var(--sal));padding-right:calc(10px + var(--sar))}
  main{padding-left:calc(10px + var(--sal));padding-right:calc(10px + var(--sar))}
  .logo-sub{display:none}
  .logo-text{font-size:.88rem}
  .theme-btn{width:34px;height:34px;font-size:9px}
  .grid{gap:4px}
  .gi{padding:6px 2px}
  .gv{font-size:.72rem}
  .gl{font-size:.5rem}
  .dpg{gap:5px}
  .dpv{font-size:.76rem}
  .btn{padding:0 8px;font-size:.72rem}
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">✈</div>
    <div class="logo-words">
      <div class="logo-text">SkyTrace</div>
      <div class="logo-sub">Live Flight Tracker</div>
    </div>
  </div>
  <div class="themes">
    <button class="theme-btn active" data-t="" aria-label="Dark theme">D</button>
    <button class="theme-btn" data-t="light" aria-label="Light theme">L</button>
    <button class="theme-btn" data-t="oled" aria-label="OLED theme">O</button>
    <button class="theme-btn" data-t="hc" aria-label="High contrast theme">HC</button>
  </div>
</header>

<main>
  <div class="pills" role="tablist" aria-label="Region filter">
    <div class="pill active" role="tab" aria-selected="true"
      data-points='[{"lat":51.5,"lon":10,"r":250},{"lat":40,"lon":-95,"r":250},{"lat":35,"lon":105,"r":250},{"lat":-15,"lon":25,"r":250},{"lat":-25,"lon":135,"r":250}]'>🌍 Global</div>
    <div class="pill" role="tab"
      data-points='[{"lat":51.5,"lon":10,"r":250},{"lat":48,"lon":16,"r":220},{"lat":41,"lon":28,"r":220}]'>🇪🇺 Europe</div>
    <div class="pill" role="tab"
      data-points='[{"lat":40,"lon":-95,"r":250},{"lat":34,"lon":-118,"r":220},{"lat":44,"lon":-76,"r":220}]'>🇺🇸 N. America</div>
    <div class="pill" role="tab"
      data-points='[{"lat":35,"lon":105,"r":250},{"lat":25,"lon":82,"r":250},{"lat":1,"lon":104,"r":220},{"lat":37,"lon":127,"r":220},{"lat":35,"lon":136,"r":220}]'>🌏 Asia</div>
    <div class="pill" role="tab"
      data-points='[{"lat":22,"lon":79,"r":250},{"lat":13,"lon":77,"r":200},{"lat":28,"lon":77,"r":200}]'>🇮🇳 India</div>
    <div class="pill" role="tab"
      data-points='[{"lat":25,"lon":55,"r":250},{"lat":33,"lon":44,"r":220}]'>🕌 Mid East</div>
  </div>

  <div class="srow">
    <div class="swrap">
      <span style="color:var(--mu);font-size:14px;flex-shrink:0">🔍</span>
      <input type="text" id="qInput" inputmode="search" autocomplete="off"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="Callsign, airline, country…" maxlength="24"
        aria-label="Search flights">
    </div>
    <div class="sbtns">
      <button class="btn ol smbtn" id="spdUnitBtn" onclick="toggleSpdUnit()" aria-label="Toggle speed unit">KT</button>
      <button class="btn ol smbtn" id="altUnitBtn" onclick="toggleAltUnit()" aria-label="Toggle altitude unit">FT</button>
      <button class="btn smbtn" onclick="doSearch()" aria-label="Search">🔍</button>
    </div>
  </div>

  <div class="sbar">
    <span style="display:flex;align-items:center;min-width:0;overflow:hidden">
      <span class="ldot" id="sDot"></span>
      <span id="sMsg" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Connecting…</span>
    </span>
    <span id="sCnt" style="font-family:var(--mono);flex-shrink:0;margin-left:8px"></span>
  </div>
  <div class="pbar"><div class="pfill" id="pFill"></div></div>

  <div id="dPanel" class="dp" role="region" aria-label="Flight detail"></div>
  <div id="fList" role="list"></div>
</main>

<footer>© <span id="yr"></span> Manik Roy. All Rights Reserved.</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// ── Current-location & route APIs ───────────────────────────────────────
const locCache=new Map();
async function fetchLocation(lat,lon){
 const k=lat.toFixed(1)+','+lon.toFixed(1);
 if(locCache.has(k))return locCache.get(k);
 try{
  const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`,{signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw 0;
  const d=await r.json();
  const city=d.city||d.locality||'';
  const region=d.principalSubdivision||'';
  const country=d.countryName||'';
  const place=!country?'Over open ocean':[city,region,country].filter(Boolean).join(', ');
  locCache.set(k,place);return place;
 }catch{return null}
}
const routeCache=new Map();
async function fetchRoute(cs){
 const c=(cs||'').trim().toUpperCase();if(!c)return null;
 if(routeCache.has(c))return routeCache.get(c);
 try{
  const r=await fetch(`https://api.adsbdb.com/v0/callsign/${c}`,{signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw 0;
  const d=await r.json();
  const rt=d?.response?.flightroute;
  if(!rt){routeCache.set(c,null);return null}
  const route={
   origin:rt.origin?{name:rt.origin.name,city:rt.origin.municipality,iata:rt.origin.iata_code}:null,
   destination:rt.destination?{name:rt.destination.name,city:rt.destination.municipality,iata:rt.destination.iata_code}:null
  };
  routeCache.set(c,route);return route;
 }catch{routeCache.set(c,null);return null}
}

// ── Formatters (100% real API values, unit-converted only) ────────────
function fmtAlt(f){
 if(f.alt_baro==='ground')return'Ground';
 const v=f.alt_baro!=null?Number(f.alt_baro):(f.alt_geom!=null?Number(f.alt_geom):null);
 if(v==null||isNaN(v))return'—';
 return unitM?Math.round(v*0.3048).toLocaleString()+' m':Math.round(v).toLocaleString()+' ft';
}
function fmtSpd(kts){
 if(kts==null)return'—';const n=Math.max(0,Number(kts));if(isNaN(n))return'—';
 return unitKm?Math.round(n*1.852)+' km/h':Math.round(n)+' kts';
}
function fmtVspd(fpm){
 if(fpm==null)return'—';const n=Number(fpm);if(isNaN(n)||Math.abs(n)<64)return'⟷ Level';
 const a=n>0?'↑ ':'↓ ';
 return unitM?a+Math.abs(Math.round(n*0.3048)).toLocaleString()+' m/min':a+Math.abs(Math.round(n)).toLocaleString()+' fpm';
}
function compass(deg){if(deg==null)return'—';return['N','NE','E','SE','S','SW','W','NW'][Math.round(Number(deg)/45)%8]}
function fmtHdg(f){return f.track!=null?Math.round(Number(f.track))+'° '+compass(f.track):'—'}
function isGnd(f){return f.alt_baro==='ground'}

// ── rAF progress bar ───────────────────────────────────────────────────
function startProgress(){
 pStart=performance.now();if(rafId)cancelAnimationFrame(rafId);
 const bar=document.getElementById('pFill');
 (function tick(now){
  const pct=Math.max(0,1-(now-pStart)/REFRESH_MS);
  bar.style.width=(pct*100)+'%';
  if(pct>0)rafId=requestAnimationFrame(tick);
 })(pStart);
}

// ── Fetch (staggered 1.1 s to respect API rate limit) ─────────────────
async function fetchRegion(pts){
 const BASE='https://api.airplanes.live/v2/point';
 const results=[];
 for(let i=0;i<pts.length;i++){
  if(i>0)await new Promise(r=>setTimeout(r,1100));
  try{
   const{lat,lon,r}=pts[i];
   const res=await fetch(`${BASE}/${lat}/${lon}/${r}`,{signal:AbortSignal.timeout(12000)});
   if(res.ok){const d=await res.json();if(d.ac)results.push(...d.ac)}
  }catch{}
 }
 const map=new Map();
 for(const ac of results){if(ac.hex)map.set(ac.hex,ac)}
 return[...map.values()];
}

// ── Main cycle ─────────────────────────────────────────────────────────
async function loadFlights(){
 clearTimeout(refreshTimer);
 if(isFirst){setStatus('Fetching live data…','');showLoader()}
 startProgress();
 try{
  const ac=await fetchRegion(currentPts);
  allFlights=ac;flightMap=new Map(ac.map(f=>[f.hex,f]));
  const ts=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setStatus('Live · '+ts,ac.length+' aircraft');
  if(isFirst){isFirst=false;renderList()}else updateInPlace();
 }catch(e){
  setStatus('⚠ '+(e.message||'Error'),'',true);
  if(isFirst)showEmpty('Could not reach airplanes.live.<br>Check your connection and try again.');
 }
 refreshTimer=setTimeout(loadFlights,REFRESH_MS);
}
function startCycle(){
 clearTimeout(refreshTimer);if(rafId)cancelAnimationFrame(rafId);
 allFlights=[];flightMap=new Map();isFirst=true;loadFlights();
}

// ── Card HTML ──────────────────────────────────────────────────────────
function cardHTML(f){
 const cs=(f.flight||f.hex||'UNKNOWN').trim();
 const gnd=isGnd(f),c=getCountry(f.hex),al=getAirline(f.flight);
 const reg=f.r||'',typ=f.t||'';
 return`<div class="fc" data-hex="${f.hex}" onclick="openDetail('${f.hex}')" role="listitem" aria-label="Flight ${cs}">
  <div class="fc-top">
   <span class="cs">${cs}</span>
   <span class="badge ${gnd?'gnd':'air'}">${gnd?'🛑 Ground':'🟢 Airborne'}</span>
  </div>
  ${al?`<div class="arow">🏢 ${al}</div>`:''}
  ${c?`<div class="crow"><span class="cflag">${c.flag}</span><span class="cname">${c.name}</span><span class="cori">— ${c.origin}</span></div>`:''}
  <div class="grid">
   <div class="gi"><div class="gl">Alt (Baro)</div><div class="gv" data-f="alt">${gnd?'Ground':fmtAlt(f)}</div></div>
   <div class="gi"><div class="gl">Speed (GS)</div><div class="gv" data-f="spd">${fmtSpd(f.gs)}</div></div>
   <div class="gi"><div class="gl">Heading</div><div class="gv">${fmtHdg(f)}</div></div>
  </div>
  <div class="meta">
   ${reg?`<span>✈ ${reg}</span>`:''}
   ${typ?`<span>📋 ${typ}</span>`:''}
   <span style="margin-left:auto;opacity:.4;font-size:.6rem">${f.hex||''}</span>
  </div>
 </div>`;
}

// ── Render list ────────────────────────────────────────────────────────
function renderList(){
 const q=document.getElementById('qInput').value.toLowerCase().trim();
 let list=q
  ?allFlights.filter(f=>{
   const c=getCountry(f.hex),al=getAirline(f.flight);
   return(f.flight||'').toLowerCase().includes(q)||
    (f.r||'').toLowerCase().includes(q)||(f.t||'').toLowerCase().includes(q)||
    (f.hex||'').toLowerCase().includes(q)||
    (c&&c.name.toLowerCase().includes(q))||(al&&al.toLowerCase().includes(q));
  })
  :allFlights.slice(0,60);
 shownFlights=list;
 if(!list.length){
  showEmpty(q?`No aircraft match "<b>${q}</b>"`:'No aircraft found.<br>Try another region or wait for refresh.');
  return;
 }
 document.getElementById('fList').innerHTML=list.map(cardHTML).join('');
}

// ── In-place update (no re-render flicker) ────────────────────────────
function flashEl(el){el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),600)}
function updateInPlace(){
 const q=document.getElementById('qInput').value.toLowerCase().trim();
 if(q){isFirst=true;renderList();isFirst=false;return}
 document.querySelectorAll('.fc[data-hex]').forEach(card=>{
  const f=flightMap.get(card.dataset.hex);if(!f)return;
  const gnd=isGnd(f);
  const badge=card.querySelector('.badge');
  if(badge){badge.className='badge '+(gnd?'gnd':'air');badge.textContent=gnd?'🛑 Ground':'🟢 Airborne'}
  const setV=(field,val)=>{
   const el=card.querySelector(`[data-f="${field}"]`);
   if(el&&el.textContent!==val){el.textContent=val;flashEl(el)}
  };
  setV('alt',gnd?'Ground':fmtAlt(f));setV('spd',fmtSpd(f.gs));
 });
 if(pinnedHex){const f=flightMap.get(pinnedHex);if(f)renderDetail(f,true)}
}

// ── Detail panel ───────────────────────────────────────────────────────
function openDetail(hex){
 pinnedHex=hex;const f=flightMap.get(hex);if(f)renderDetail(f,false);
}
function renderDetail(f,updateOnly){
 const cs=(f.flight||f.hex||'UNKNOWN').trim();
 const gnd=isGnd(f),c=getCountry(f.hex),al=getAirline(f.flight);
 const altG=f.alt_geom!=null?Number(f.alt_geom).toLocaleString()+' ft':'—';
 const panel=document.getElementById('dPanel');

 if(updateOnly){
  const patch=(id,val)=>{const el=panel.querySelector(id);if(el&&el.textContent!==val){el.textContent=val;flashEl(el)}};
  patch('#dp-alt',gnd?'Ground':fmtAlt(f));
  patch('#dp-spd',fmtSpd(f.gs));
  patch('#dp-hdg',fmtHdg(f));
  patch('#dp-vr',fmtVspd(f.baro_rate??f.geom_rate));
  if(f.lat!=null&&f.lon!=null){
   const myHex=f.hex;
   fetchLocation(f.lat,f.lon).then(place=>{
    if(pinnedHex!==myHex)return;
    const el=document.getElementById('dp-loc');
    if(el)el.textContent=place?'📍 Currently over: '+place:'📍 Location unavailable';
   });
  }
  return;
 }

 panel.innerHTML=`
  <div class="dph">
   <div style="min-width:0">
    <div class="dpcs">${cs}</div>
    <div class="dpmu">ICAO24: ${f.hex||'—'}</div>
    <div class="dpmu">Squawk: ${f.squawk||'—'} · ${f.type||'—'}</div>
   </div>
   <button class="dp-close" onclick="closeDetail()" aria-label="Close detail">✕</button>
  </div>
  ${c?`<div class="dp-crow">
   <span class="dp-cflag">${c.flag}</span>
   <div><div class="dp-cname">${c.name}</div><div class="dp-cori">${c.origin}</div></div>
  </div>`:''}
  <div class="dp-locrow" id="dp-loc">📍 Locating…</div>
  <div class="dp-routerow" id="dp-route">🧭 Looking up route…</div>
  <div class="dpg">
   <div class="dpi"><div class="dpl">Airline</div><div class="dpv">${al||'—'}</div></div>
   <div class="dpi"><div class="dpl">Registration</div><div class="dpv">${f.r||'—'}</div></div>
   <div class="dpi"><div class="dpl">Aircraft Type</div><div class="dpv">${f.t||'—'}</div></div>
   <div class="dpi"><div class="dpl">Status</div><div class="dpv">${gnd?'🛑 Ground':'✈ Airborne'}</div></div>
   <div class="dpi"><div class="dpl">Alt Baro</div><div class="dpv" id="dp-alt">${gnd?'Ground':fmtAlt(f)}</div></div>
   <div class="dpi"><div class="dpl">Alt Geometric</div><div class="dpv">${altG}</div></div>
   <div class="dpi"><div class="dpl">Ground Speed</div><div class="dpv" id="dp-spd">${fmtSpd(f.gs)}</div></div>
   <div class="dpi"><div class="dpl">True Airspeed</div><div class="dpv">${fmtSpd(f.tas)}</div></div>
   <div class="dpi"><div class="dpl">Heading</div><div class="dpv" id="dp-hdg">${fmtHdg(f)}</div></div>
   <div class="dpi"><div class="dpl">Vert. Rate</div><div class="dpv" id="dp-vr">${fmtVspd(f.baro_rate??f.geom_rate)}</div></div>
   <div class="dpi"><div class="dpl">Latitude</div><div class="dpv">${f.lat!=null?Number(f.lat).toFixed(4)+'°':'—'}</div></div>
   <div class="dpi"><div class="dpl">Longitude</div><div class="dpv">${f.lon!=null?Number(f.lon).toFixed(4)+'°':'—'}</div></div>
   <div class="dpi"><div class="dpl">RSSI</div><div class="dpv">${f.rssi!=null?f.rssi+' dBFS':'—'}</div></div>
   <div class="dpi"><div class="dpl">Messages</div><div class="dpv">${f.messages!=null?Number(f.messages).toLocaleString():'—'}</div></div>
   <div class="dpi" style="grid-column:1/-1"><div class="dpl">Nav Modes</div><div class="dpv">${(f.nav_modes||[]).join(', ')||'—'}</div></div>
  </div>`;
 panel.classList.add('show');
 panel.scrollIntoView({behavior:'smooth',block:'nearest'});

 if(f.lat!=null&&f.lon!=null){
  const myHex=f.hex;
  fetchLocation(f.lat,f.lon).then(place=>{
   if(pinnedHex!==myHex)return;
   const el=document.getElementById('dp-loc');
   if(el)el.textContent=place?'📍 Currently over: '+place:'📍 Location unavailable';
  });
 }else{const el=document.getElementById('dp-loc');if(el)el.textContent='📍 Position unknown'}

 const myHex2=f.hex;
 fetchRoute(f.flight).then(route=>{
  if(pinnedHex!==myHex2)return;
  const el=document.getElementById('dp-route');if(!el)return;
  if(!route||(!route.origin&&!route.destination)){el.textContent='🧭 Route not available';return}
  const o=route.origin,d=route.destination;
  const oT=o?`${o.city||o.name}${o.iata?' ('+o.iata+')':''}`:'Unknown origin';
  const dT=d?`${d.city||d.name}${d.iata?' ('+d.iata+')':''}`:'Unknown destination';
  el.innerHTML=`🧭 <b>${oT}</b> &nbsp;→&nbsp; <b>${dT}</b>`;
 });
}
function closeDetail(){pinnedHex=null;document.getElementById('dPanel').classList.remove('show')}

// ── Search ─────────────────────────────────────────────────────────────
function doSearch(){isFirst=true;renderList();isFirst=false}
document.getElementById('qInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.target.blur();doSearch()}});

// ── Boot ───────────────────────────────────────────────────────────────
startCycle();
</script>
</body>
</html>
