<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="color-scheme" content="dark light">
<title>SkyTrace — Live Flight Tracker</title>
<meta name="description" content="Real-time global flight tracker with live altitude, speed, airline and country-of-origin data.">
<meta name="theme-color" content="#3b82f6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SkyTrace">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--sur:#161b22;--card:#1e242e;--bdr:#2a3140;--acc:#3b82f6;--acc2:#60a5fa;--tx:#e6edf3;--mu:#7d8998;--gr:#22c55e;--am:#f59e0b;--re:#ef4444;--rr:12px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px)}
[data-theme=light]{--bg:#f0f4f8;--sur:#fff;--card:#e8eef5;--bdr:#c8d4e0;--acc:#2563eb;--acc2:#3b82f6;--tx:#0f172a;--mu:#64748b}
[data-theme=oled]{--bg:#000;--sur:#0a0a0a;--card:#111;--bdr:#1a1a1a;--acc:#3b82f6;--acc2:#60a5fa;--tx:#fff;--mu:#666}
[data-theme=hc]{--bg:#000;--sur:#000;--card:#000;--bdr:#fff;--acc:#ff0;--acc2:#ff0;--tx:#fff;--mu:#ccc}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior-y:none}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;width:100%;max-width:100vw;overflow-x:hidden;transition:background .25s,color .25s;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;touch-action:pan-y}
button,input{font:inherit;-webkit-appearance:none;appearance:none;touch-action:manipulation}
a,button,.pill,.fc,.theme-btn{touch-action:manipulation}
/* Hover states only apply on devices that truly support hover (mouse/trackpad) — prevents sticky :hover on touch */
@media (hover:hover) and (pointer:fine){
  .pill:hover,.theme-btn:hover{border-color:var(--acc);color:var(--acc)}
  .pill.active:hover{color:#fff}
  .fc:hover{border-color:var(--acc)}
  .btn:hover{opacity:.82}
}
header{width:100%;max-width:700px;padding:calc(16px + var(--sat)) calc(16px + var(--sar)) 0 calc(16px + var(--sal));display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:1}
.logo-icon{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:1rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-sub{font-size:.58rem;color:var(--mu);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.themes{display:flex;gap:4px}
.theme-btn{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--bdr);cursor:pointer;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--sur);color:var(--mu);-webkit-tap-highlight-color:transparent}
.theme-btn.active{border-color:var(--acc);color:var(--acc)}
.theme-btn:active{transform:scale(0.92)}
main{width:100%;max-width:700px;padding:12px calc(16px + var(--sar)) calc(12px + var(--sab)) calc(16px + var(--sal))}
.pills{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x proximity;padding-bottom:2px}
.pills::-webkit-scrollbar{display:none}
.pills .pill{scroll-snap-align:start}
@media (min-width:600px){.pills{flex-wrap:wrap;overflow-x:visible}}
.pill{background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:8px 12px;min-height:36px;display:inline-flex;align-items:center;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace;color:var(--mu);white-space:nowrap}
.pill:active{transform:scale(0.96)}
.pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
.srow{display:flex;gap:6px;margin-bottom:10px}
.swrap{flex:1;background:var(--sur);border:1.5px solid var(--bdr);border-radius:9px;padding:10px 11px;min-height:40px;display:flex;align-items:center;gap:7px;transition:border-color .15s}
.swrap:focus-within{border-color:var(--acc)}
.swrap input{flex:1;background:none;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--tx);min-width:0}
@media (min-width:480px){.swrap input{font-size:.8rem}}
.swrap input::placeholder{color:var(--mu)}
.btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:10px 14px;min-height:40px;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(0.96)}
.btn.ol{background:none;color:var(--acc);border:1.5px solid var(--acc)}
#spdUnitBtn,#altUnitBtn{min-width:44px;text-align:center;padding:10px 6px}
.sbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;font-size:.71rem;color:var(--mu);gap:8px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--gr);display:inline-block;margin-right:5px;animation:pulse 2s infinite;flex-shrink:0}
.edot{width:7px;height:7px;border-radius:50%;background:var(--re);display:inline-block;margin-right:5px;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pbar{height:2px;background:var(--bdr);border-radius:2px;margin-bottom:10px;overflow:hidden}
.pfill{height:100%;background:var(--acc);border-radius:2px;width:100%}
/* Flight cards */
.fc{background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--rr);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,transform .1s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.fc:active{transform:scale(0.985);border-color:var(--acc)}
.fc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc)}
.fc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:6px}
.cs{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:600;letter-spacing:.04em;color:var(--acc2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:.59rem;font-weight:600;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.air{background:rgba(34,197,94,.12);color:var(--gr);border:1px solid rgba(34,197,94,.22)}
.gnd{background:rgba(245,158,11,.12);color:var(--am);border:1px solid rgba(245,158,11,.22)}
/* Airline row */
.arow{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.aico{font-size:.68rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--acc);color:#fff;padding:1px 6px;border-radius:5px;flex-shrink:0}
.aname{font-size:.75rem;font-weight:600;color:var(--tx)}
/* Airline row */
.arow{font-size:.72rem;font-weight:600;color:var(--acc2);margin-bottom:4px}
/* Country row */
.crow{display:flex;align-items:baseline;gap:5px;margin-bottom:7px;flex-wrap:wrap;line-height:1.4}
.cflag{font-size:.85rem}
.cname{font-size:.72rem;font-weight:600;color:var(--tx)}
.cori{font-size:.63rem;color:var(--mu);font-style:italic}
/* Live grid */
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:7px}
.gi{text-align:center;background:var(--card);border-radius:7px;padding:6px 3px}
.gl{font-size:.55rem;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;font-family:'JetBrains Mono',monospace}
.gv{font-size:.8rem;font-weight:700;font-family:'JetBrains Mono',monospace;transition:color .35s}
.gv.flash{color:var(--acc2)}
.meta{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--mu);font-family:'JetBrains Mono',monospace;flex-wrap:wrap}
/* Detail panel */
.dp{background:var(--sur);border:1.5px solid var(--acc);border-radius:var(--rr);padding:14px;margin-bottom:10px;display:none}
.dp.show{display:block}
.dph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;gap:8px}
.dpcs{font-family:'JetBrains Mono',monospace;font-size:1.08rem;font-weight:700;color:var(--acc2)}
.dpmu{font-size:.6rem;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-top:3px;line-height:1.5}
.dp-crow{background:var(--card);border-radius:8px;padding:9px 11px;margin-bottom:8px;display:flex;align-items:flex-start;gap:9px}
.dp-cflag{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.dp-cname{font-size:.82rem;font-weight:600;margin-bottom:2px}
.dp-cori{font-size:.7rem;color:var(--mu);font-style:italic;line-height:1.5}
.dp-locrow{background:var(--card);border-radius:8px;padding:8px 11px;margin-bottom:6px;font-size:.76rem;font-weight:500}
.dp-routerow{background:var(--card);border-radius:8px;padding:8px 11px;margin-bottom:8px;font-size:.78rem;line-height:1.5}
.dpg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dpi{background:var(--card);border-radius:7px;padding:8px 9px}
.dpl{font-size:.57rem;color:var(--mu);text-transform:uppercase;font-family:'JetBrains Mono',monospace;letter-spacing:.07em;margin-bottom:2px}
.dpv{font-size:.82rem;font-weight:600;font-family:'JetBrains Mono',monospace;word-break:break-all;transition:color .35s}
.dpv.flash{color:var(--acc2)}
.loader{text-align:center;padding:36px 20px;color:var(--mu)}
.spin{width:28px;height:28px;border:2.5px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 9px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px 20px;color:var(--mu);font-size:.82rem;line-height:1.7}
footer{width:100%;max-width:700px;padding:12px calc(16px + var(--sar)) calc(12px + var(--sab)) calc(16px + var(--sal));text-align:center;font-size:.67rem;color:var(--mu);margin-top:auto;border-top:1px solid var(--bdr)}

/* Extra-narrow phones (iPhone SE, small Android — 320–360px) */
@media (max-width:360px){
  header{padding-left:calc(12px + var(--sal));padding-right:calc(12px + var(--sar))}
  main{padding-left:calc(12px + var(--sal));padding-right:calc(12px + var(--sar))}
  .logo-text{font-size:.92rem}
  .logo-sub{display:none}
  .theme-btn{width:34px;height:34px}
  .grid{gap:4px}
  .gi{padding:5px 2px}
  .gv{font-size:.74rem}
  .gl{font-size:.52rem}
  .dpg{grid-template-columns:1fr 1fr;gap:5px}
  .dpv{font-size:.78rem}
}
</style>
</head>
<body>
<header>

  </div>
  <div class="themes">
    <button class="theme-btn active" data-t="">D</button>
    <button class="theme-btn" data-t="light">L</button>

    <button class="theme-btn" data-t="hc">HC</button>
  </div>
</header>
<main>

    <div class="pill" data-points='[{"lat":40,"lon":-95,"r":250},{"lat":34,"lon":-118,"r":220},{"lat":44,"lon":-76,"r":220}]'>🇺🇸 N. America</div>
    <div class="pill" data-points='[{"lat":35,"lon":105,"r":250},{"lat":25,"lon":82,"r":250},{"lat":1,"lon":104,"r":220},{"lat":37,"lon":127,"r":220},{"lat":35,"lon":136,"r":220}]'>🌏 Asia</div>
    <div class="pill" data-points='[{"lat":22,"lon":79,"r":250},{"lat":13,"lon":77,"r":200},{"lat":28,"lon":77,"r":200}]'>🇮🇳 India</div>
    <div class="pill" data-points='[{"lat":25,"lon":55,"r":250},{"lat":33,"lon":44,"r":220}]'>🕌 Mid East</div>

  <div class="srow">
    <div class="swrap">
      <span style="color:var(--mu);font-size:13px">🔍</span>
      <input type="text" id="qInput" placeholder="Callsign, reg, country name, type… ↵" maxlength="24">
    </div>
    <button class="btn ol" id="spdUnitBtn" onclick="toggleSpdUnit()" title="Toggle speed unit">KT</button>
    <button class="btn ol" id="altUnitBtn" onclick="toggleAltUnit()" title="Toggle altitude unit">FT</button>
    <button class="btn" onclick="doSearch()">Search</button>

  <div class="sbar">
    <span style="display:flex;align-items:center"><span class="ldot" id="sDot"></span><span id="sMsg">Connecting…</span></span>
    <span id="sCnt" style="font-family:'JetBrains Mono',monospace;flex-shrink:0"></span>
  </div>
  <div class="pbar"><div class="pfill" id="pFill"></div></div>

  <div id="dPanel" class="dp"></div>
  <div id="fList"></div>
</main>
<footer>© <span id="yr"></span> Manik Roy. All Rights Reserved.</footer>

// Build prefix → info map (2-char keys, simple O(1) lookup)

  if (!hex) return null;
  return CMAP.get(hex.toLowerCase().replace('~','').slice(0,2)) || null;
}

// Unit systems — independent toggles:
//   unitKm  → speed: false = Knots,  true = Km/h
//   unitM   → altitude & vertical rate: false = Feet/fpm, true = Metres/m-min
// ─────────────────────────────────────────────────────────────────────────────
let unitKm = false;
let unitM  = false;

function toggleSpdUnit() {
  unitKm = !unitKm;
  document.getElementById('spdUnitBtn').textContent = unitKm ? 'KM/H' : 'KT';
  localStorage.setItem('skytrace-spdunit', unitKm ? 'km' : 'kt');
  refreshUnits();
}
function toggleAltUnit() {
  unitM = !unitM;
  document.getElementById('altUnitBtn').textContent = unitM ? 'M' : 'FT';
  localStorage.setItem('skytrace-altunit', unitM ? 'm' : 'ft');
  refreshUnits();
}
function refreshUnits() {
  if (!isFirst) renderList();          // re-render visible cards in new units
  if (pinnedHex) { const f = flightMap.get(pinnedHex); if (f) renderDetail(f, false); }
}
(function initUnits() {
  try {
    unitKm = localStorage.getItem('skytrace-spdunit') === 'km';
    unitM  = localStorage.getItem('skytrace-altunit') === 'm';
    document.getElementById('spdUnitBtn').textContent = unitKm ? 'KM/H' : 'KT';
    document.getElementById('altUnitBtn').textContent = unitM ? 'M' : 'FT';
  } catch(_) {}
})();

// ─────────────────────────────────────────────────────────────────────────────
// Formatters — source data: alt_baro/alt_geom in FEET, gs/tas in KNOTS, baro_rate in FPM
// Converted on display per toggle: ft→m (×0.3048), kt→km/h (×1.852), fpm→m/min (×0.3048)
// ─────────────────────────────────────────────────────────────────────────────
function fmtAlt(f, extraFt) {
  if (f.alt_baro === 'ground') return 'Ground';
  let v = f.alt_baro != null ? Number(f.alt_baro) : (f.alt_geom != null ? Number(f.alt_geom) : null);
  if (v == null || isNaN(v)) return '—';
  const totalFt = v + (extraFt || 0);
  return unitM
    ? Math.round(totalFt * 0.3048).toLocaleString() + ' m'
    : Math.round(totalFt).toLocaleString() + ' ft';
}
function fmtSpd(kts) {
  if (kts == null) return '—';
  const n = Number(kts);
  if (isNaN(n)) return '—';
  const v = Math.max(0, n);
  return unitKm
    ? Math.round(v * 1.852) + ' km/h'
    : Math.round(v) + ' kts';
}
function fmtVspd(fpm) {
  if (fpm == null) return '—';
  const n = Number(fpm);
  if (isNaN(n) || Math.abs(n) < 64) return '⟷ Level';
  const arrow = n > 0 ? '↑ ' : '↓ ';
  return unitM
    ? arrow + Math.abs(Math.round(n * 0.3048)).toLocaleString() + ' m/min'
    : arrow + Math.abs(Math.round(n)).toLocaleString() + ' fpm';
}
function compass(deg) {
  if (deg == null) return '—';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(Number(deg) / 45) % 8];
}
function fmtHdg(f) {
  return f.track != null ? Math.round(Number(f.track)) + '° ' + compass(f.track) : '—';
}
function isGnd(f) { return f.alt_baro === 'ground'; }

// ─────────────────────────────────────────────────────────────────────────────
// Dead-reckoning: extrapolate altitude & speed from last fetch time
// ─────────────────────────────────────────────────────────────────────────────
function deadReckon(f) {
  if (isGnd(f) || !f._at) return { extraFt: 0 };
  const ageSec = (Date.now() - f._at) / 1000;
  const vr = f.baro_rate != null ? Number(f.baro_rate) : (f.geom_rate != null ? Number(f.geom_rate) : 0);
  return { extraFt: vr * ageSec / 60 };
}

// ─────────────────────────────────────────────────────────────────────────────
// rAF progress bar
// ─────────────────────────────────────────────────────────────────────────────
function startProgress() {
  pStart = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  const bar = document.getElementById('pFill');
  function tick(now) {
    const pct = Math.max(0, 1 - (now - pStart) / REFRESH_MS);
    bar.style.width = (pct * 100) + '%';
    if (pct > 0) rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// ─────────────────────────────────────────────────────────────────────────────
// LIVE TICKER — fires every second, updates alt & speed in every visible card
// Uses vertical rate dead-reckoning for altitude between API refreshes
// ─────────────────────────────────────────────────────────────────────────────
function startTicker() {
  clearInterval(tickTimer);
  tickTimer = setInterval(() => {
    document.querySelectorAll('.fc[data-hex]').forEach(card => {
      const f = flightMap.get(card.dataset.hex);
      if (!f || isGnd(f)) return;
      const { extraFt } = deadReckon(f);
      // Altitude
      const aEl = card.querySelector('[data-f="alt"]');
      if (aEl) {
        const nv = fmtAlt(f, extraFt);
        if (aEl.textContent !== nv) {
          aEl.textContent = nv;
          aEl.classList.add('flash');
          setTimeout(() => aEl.classList.remove('flash'), 380);
        }
      }
      // Speed — direct from API (knots, real value)
      const sEl = card.querySelector('[data-f="spd"]');
      if (sEl) sEl.textContent = fmtSpd(f.gs);
    });
    // Update open detail panel live values too
    if (pinnedHex) {
      const f = flightMap.get(pinnedHex);
      if (f && !isGnd(f)) {
        const { extraFt } = deadReckon(f);
        const da = document.getElementById('dp-alt');
        if (da) {
          const nv = fmtAlt(f, extraFt);
          if (da.textContent !== nv) { da.textContent = nv; flashEl(da); }
        }
        const ds = document.getElementById('dp-spd');
        if (ds) { const nv = fmtSpd(f.gs); if (ds.textContent !== nv) ds.textContent = nv; }
        const dvr = document.getElementById('dp-vr');
        if (dvr) dvr.textContent = fmtVspd(f.baro_rate ?? f.geom_rate);
        const dh = document.getElementById('dp-hdg');
        if (dh) dh.textContent = fmtHdg(f);
      }
    }
  }, 1000);
}

function flashEl(el) {
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 380);
}

// ─────────────────────────────────────────────────────────────────────────────
// Fetch: staggered point queries (1.1 s apart to respect 1 req/s limit)
// ─────────────────────────────────────────────────────────────────────────────
async function fetchRegion(pts) {
  const BASE = 'https://api.airplanes.live/v2/point';
  const results = [];
  for (let i = 0; i < pts.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 1100));
    try {
      const {lat, lon, r} = pts[i];
      const res = await fetch(`${BASE}/${lat}/${lon}/${r}`, {signal: AbortSignal.timeout(12000)});
      if (res.ok) { const d = await res.json(); if (d.ac) results.push(...d.ac); }
    } catch(_) {}
  }
  const now = Date.now();
  const map = new Map();
  for (const ac of results) { if (ac.hex) { ac._at = now; map.set(ac.hex, ac); } }
  return [...map.values()];
}

// ─────────────────────────────────────────────────────────────────────────────
// Main load cycle
// ─────────────────────────────────────────────────────────────────────────────
async function loadFlights() {
  clearTimeout(refreshTimer);
  if (isFirst) { setStatus('Fetching live data…', ''); showLoader(); }
  startProgress();
  try {
    const ac = await fetchRegion(currentPts);
    allFlights = ac;
    flightMap = new Map(ac.map(f => [f.hex, f]));
    const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    setStatus('Live · ' + ts, ac.length + ' aircraft');
    if (isFirst) { isFirst = false; renderList(); startTicker(); }
    else updateInPlace();
  } catch(e) {
    setStatus('⚠ ' + (e.message || 'Error'), '', true);
    if (isFirst) showEmpty('Could not reach airplanes.live.<br>Check your connection and try again.');
  }
  refreshTimer = setTimeout(loadFlights, REFRESH_MS);
}

function startCycle() {
  clearTimeout(refreshTimer); clearInterval(tickTimer);
  if (rafId) cancelAnimationFrame(rafId);
  allFlights = []; flightMap = new Map(); isFirst = true;
  loadFlights();
}

    </div>` : ''}
    <div class="grid">
      <div class="gi"><div class="gl">Alt (Baro)</div><div class="gv" data-f="alt">${gnd ? 'Ground' : fmtAlt(f)}</div></div>
      <div class="gi"><div class="gl">Speed (GS)</div><div class="gv" data-f="spd">${fmtSpd(f.gs)}</div></div>
      <div class="gi"><div class="gl">Heading</div><div class="gv">${fmtHdg(f)}</div></div>
    </div>
    <div class="meta">
      ${reg ? `<span>✈ ${reg}</span>` : ''}
      ${typ ? `<span>📋 ${typ}</span>` : ''}
      <span style="margin-left:auto;opacity:.4;font-size:.62rem">${f.hex || ''}</span>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Render full list
// ─────────────────────────────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('qInput').value.toLowerCase().trim();
  let list = q
    ? allFlights.filter(f => {
        const c = getCountry(f.hex);
        const al = getAirline(f.flight);
        return (f.flight||'').toLowerCase().includes(q) ||
               (f.r||'').toLowerCase().includes(q) ||
               (f.t||'').toLowerCase().includes(q) ||
               (f.hex||'').toLowerCase().includes(q) ||
               (c && c.name.toLowerCase().includes(q)) ||
               (al && al.toLowerCase().includes(q));
      })
    : allFlights.slice(0, 60);
  if (!list.length) {
    showEmpty(q ? `No aircraft match "<b>${q}</b>"` : 'No aircraft found.<br>Try another region or wait for refresh.');
    return;
  }
  document.getElementById('fList').innerHTML = list.map(cardHTML).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// In-place update: only update heading & badges; ticker handles alt/spd
// ─────────────────────────────────────────────────────────────────────────────
function updateInPlace() {
  const q = document.getElementById('qInput').value.toLowerCase().trim();
  if (q) { isFirst = true; renderList(); isFirst = false; return; }
  document.querySelectorAll('.fc[data-hex]').forEach(card => {
    const f = flightMap.get(card.dataset.hex);
    if (!f) return;
    const gnd = isGnd(f);
    const badge = card.querySelector('.badge');
    if (badge) { badge.className = 'badge ' + (gnd ? 'gnd' : 'air'); badge.textContent = gnd ? '🛑 Ground' : '🟢 Airborne'; }
  });
  // Also refresh pinned detail
  if (pinnedHex) { const f = flightMap.get(pinnedHex); if (f) renderDetail(f, true); }
}

// ─────────────────────────────────────────────────────────────────────────────
// Current location — reverse geocode lat/lon via BigDataCloud (free, no key)
// ─────────────────────────────────────────────────────────────────────────────
const locCache = new Map(); // "lat,lon" rounded → place string
async function fetchLocation(lat, lon) {
  const key = lat.toFixed(1) + ',' + lon.toFixed(1); // ~11km grid — good cache hit rate over open ocean/land
  if (locCache.has(key)) return locCache.get(key);
  try {
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`;
    const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (!res.ok) throw new Error();
    const d = await res.json();
    const city = d.city || d.locality || '';
    const region = d.principalSubdivision || '';
    const country = d.countryName || '';
    let place;
    if (!country) place = 'Over open ocean';
    else place = [city, region, country].filter(Boolean).join(', ');
    locCache.set(key, place);
    return place;
  } catch(_) {
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Route (origin → destination) — via adsbdb.com, free, no key, keyed by ICAO callsign
// ─────────────────────────────────────────────────────────────────────────────
const routeCache = new Map();
async function fetchRoute(callsign) {
  const cs = (callsign || '').trim().toUpperCase();
  if (!cs) return null;
  if (routeCache.has(cs)) return routeCache.get(cs);
  try {
    const res = await fetch(`https://api.adsbdb.com/v0/callsign/${cs}`, {signal: AbortSignal.timeout(8000)});
    if (!res.ok) throw new Error();
    const d = await res.json();
    const r = d?.response?.flightroute;
    if (!r) { routeCache.set(cs, null); return null; }
    const route = {
      origin: r.origin ? { name: r.origin.name, city: r.origin.municipality, iata: r.origin.iata_code, country: r.origin.country_name } : null,
      destination: r.destination ? { name: r.destination.name, city: r.destination.municipality, iata: r.destination.iata_code, country: r.destination.country_name } : null
    };
    routeCache.set(cs, route);
    return route;
  } catch(_) {
    routeCache.set(cs, null);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Detail panel
// ─────────────────────────────────────────────────────────────────────────────
function openDetail(hex) {
  pinnedHex = hex;
  const f = flightMap.get(hex);
  if (f) renderDetail(f, false);
}

function renderDetail(f, updateOnly) {
  const cs  = (f.flight || f.hex || 'UNKNOWN').trim();
  const gnd = isGnd(f);
  const c   = getCountry(f.hex);
  const al  = getAirline(f.flight);
  const altG = f.alt_geom != null ? Number(f.alt_geom).toLocaleString() + ' ft' : '—';
  const panel = document.getElementById('dPanel');

  if (updateOnly) {
    // Just patch the static fields (not alt/spd — ticker handles those)
    const hEl = panel.querySelector('[data-dp="hdg"]');
    if (hEl) hEl.textContent = fmtHdg(f);
    const vrEl = panel.querySelector('[data-dp="vr"]');
    if (vrEl) vrEl.textContent = fmtVspd(f.baro_rate ?? f.geom_rate);
    // Refresh current-location text as the aircraft moves (cached per ~11km grid cell)
    if (f.lat != null && f.lon != null) {
      const myHex = f.hex;
      fetchLocation(f.lat, f.lon).then(place => {
        if (pinnedHex !== myHex) return;
        const el = document.getElementById('dp-loc');
        if (el) el.textContent = place ? '📍 Currently over: ' + place : '📍 Location unavailable';
      });
    }
    return;
  }

  panel.innerHTML = `
    <div class="dph">
      <div>
        <div class="dpcs">${cs}</div>
        <div class="dpmu">ICAO24: ${f.hex||'—'} · Squawk: ${f.squawk||'—'} · ${f.type||'—'}</div>
      </div>
      <button class="btn ol" style="padding:0;width:40px;height:40px;min-height:40px;flex-shrink:0;font-size:1rem" onclick="closeDetail()" aria-label="Close">✕</button>
    </div>
    ${c ? `<div class="dp-crow">
      <span class="dp-cflag">${c.flag}</span>
      <div>
        <div class="dp-cname">${c.name}</div>
        <div class="dp-cori">Name origin: ${c.origin}</div>
      </div>
    </div>` : ''}
    <div class="dp-locrow" id="dp-loc">📍 Locating current position…</div>
    <div class="dp-routerow" id="dp-route">🧭 Looking up flight route…</div>
    <div class="dpg">
      <div class="dpi"><div class="dpl">Airline</div><div class="dpv">${al || '—'}</div></div>
      <div class="dpi"><div class="dpl">Registration</div><div class="dpv">${f.r||'—'}</div></div>
      <div class="dpi"><div class="dpl">Aircraft Type</div><div class="dpv">${f.t||'—'}</div></div>
      <div class="dpi"><div class="dpl">Status</div><div class="dpv">${gnd?'🛑 Ground':'✈ Airborne'}</div></div>
      <div class="dpi"><div class="dpl">Alt Baro — live</div><div class="dpv" id="dp-alt">${gnd?'Ground':fmtAlt(f)}</div></div>
      <div class="dpi"><div class="dpl">Alt Geometric</div><div class="dpv">${altG}</div></div>
      <div class="dpi"><div class="dpl">Ground Speed — live</div><div class="dpv" id="dp-spd">${fmtSpd(f.gs)}</div></div>
      <div class="dpi"><div class="dpl">True Airspeed</div><div class="dpv">${fmtSpd(f.tas)}</div></div>
      <div class="dpi"><div class="dpl">Heading / Track</div><div class="dpv" id="dp-hdg" data-dp="hdg">${fmtHdg(f)}</div></div>
      <div class="dpi"><div class="dpl">Vert. Rate</div><div class="dpv" id="dp-vr" data-dp="vr">${fmtVspd(f.baro_rate??f.geom_rate)}</div></div>
      <div class="dpi"><div class="dpl">Latitude</div><div class="dpv">${f.lat!=null?Number(f.lat).toFixed(4)+'°':'—'}</div></div>
      <div class="dpi"><div class="dpl">Longitude</div><div class="dpv">${f.lon!=null?Number(f.lon).toFixed(4)+'°':'—'}</div></div>
      <div class="dpi"><div class="dpl">RSSI (Signal)</div><div class="dpv">${f.rssi!=null?f.rssi+' dBFS':'—'}</div></div>
      <div class="dpi"><div class="dpl">Messages</div><div class="dpv">${f.messages!=null?Number(f.messages).toLocaleString():'—'}</div></div>
      <div class="dpi" style="grid-column:1/-1"><div class="dpl">Nav Modes</div><div class="dpv">${(f.nav_modes||[]).join(', ')||'—'}</div></div>
    </div>`;
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});

  // Async-fill current location
  if (f.lat != null && f.lon != null) {
    const myHex = f.hex;
    fetchLocation(f.lat, f.lon).then(place => {
      if (pinnedHex !== myHex) return; // user navigated away
      const el = document.getElementById('dp-loc');
      if (!el) return;
      el.textContent = place ? '📍 Currently over: ' + place : '📍 Location unavailable';
    });
  } else {
    const el = document.getElementById('dp-loc');
    if (el) el.textContent = '📍 Position unknown';
  }

  // Async-fill route (origin → destination)
  const myHex2 = f.hex;
  fetchRoute(f.flight).then(route => {
    if (pinnedHex !== myHex2) return;
    const el = document.getElementById('dp-route');
    if (!el) return;
    if (!route || (!route.origin && !route.destination)) {
      el.innerHTML = '🧭 Route data not available for this flight';
      return;
    }
    const o = route.origin, d = route.destination;
    const oTxt = o ? `${o.city || o.name}${o.iata ? ' (' + o.iata + ')' : ''}` : 'Unknown origin';
    const dTxt = d ? `${d.city || d.name}${d.iata ? ' (' + d.iata + ')' : ''}` : 'Unknown destination';
    el.innerHTML = `🧭 <b>${oTxt}</b> &nbsp;→&nbsp; <b>${dTxt}</b>`;
  });
}

function closeDetail() {
  pinnedHex = null;
  document.getElementById('dPanel').classList.remove('show');
}

// ─────────────────────────────────────────────────────────────────────────────
// Search
// ─────────────────────────────────────────────────────────────────────────────
function doSearch() { isFirst = true; renderList(); isFirst = false; }
document.getElementById('qInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent.com')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
startCycle();

</script>

</html>
